permissions:
  id-token: write # Это необходимо для запроса JWT

on: 
  push:
    branches: [ feature** ]
    paths-ignore:
      - '.github/**'

  # Позволяет запускать этот workflow вручную из вкладки Actions
  workflow_dispatch:

env:
  FOLDER_ID: b1g0c1gbbfne9m7iccf1
  SA_ID: ajekn5c70l54fvmkt1qj
  FUNCTION_NAME: from-github-preprod
  FUNCTION_RUNTIME: python314
  FUNCTION_ENTRYPOINT: main.handler
  FUNCTION_MEMORY: "128mb"
  FUNCTION_SOURCEROOT: .
  
jobs:
  build:
    environment: preprod
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Function
        id: sls-func
        uses: yc-actions/yc-sls-function@v3.1.0
        with:
          yc-sa-id: ${{env.SA_ID}}
          folder-id: ${{env.FOLDER_ID}}
          function-name: ${{env.FUNCTION_NAME}}
          runtime: ${{env.FUNCTION_RUNTIME}}
          entrypoint: ${{env.FUNCTION_ENTRYPOINT}}
          memory: ${{env.FUNCTION_MEMORY}}
          source-root: ${{env.FUNCTION_SOURCEROOT}}
          include: |
            **/*.py
            **/*.txt